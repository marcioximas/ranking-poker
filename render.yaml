services:
  - type: web
    name: poker-night
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////data/poker_night.db
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: poker-data
      mountPath: /data
      sizeGB: 1
